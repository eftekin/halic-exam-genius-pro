<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="cap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef2ff" />
      <stop offset="100%" stop-color="#e0e7ff" />
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)" />
  <!-- Graduation cap board (diamond) -->
  <polygon points="64,28 112,52 64,68 16,52" fill="url(#cap)" />
  <!-- Cap body -->
  <polygon points="32,54 32,76 64,90 96,76 96,54 64,70" fill="#4338ca" opacity="0.85" />
  <!-- Tassel string -->
  <line x1="64" y1="52" x2="100" y2="52" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" />
  <line x1="100" y1="52" x2="100" y2="78" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" />
  <!-- Tassel end -->
  <circle cx="100" cy="82" r="4" fill="#6366f1" />
  <!-- Button on top -->
  <circle cx="64" cy="48" r="4" fill="#818cf8" />
</svg>