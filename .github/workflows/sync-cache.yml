# Optional: Force cache refresh on schedule (backup when in-process HEAD sync fails).
# Enable by adding CACHE_INVALIDATE_URL secret (e.g. https://your-api.com/api/cache/invalidate).
# Runs daily at 06:00 UTC. Disable by removing the schedule trigger.
name: Sync Cache

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch:

jobs:
  invalidate:
    name: Invalidate cache
    runs-on: ubuntu-latest
    if: secrets.CACHE_INVALIDATE_URL != ''
    steps:
      - name: Invalidate exam data cache
        run: |
          curl -sf -X POST "${{ secrets.CACHE_INVALIDATE_URL }}" || echo "Cache invalidate failed (non-fatal)"
