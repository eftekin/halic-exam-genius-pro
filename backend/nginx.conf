# ── Nginx reverse proxy for Exam Genius API ──────────────────────────────────
# Forwards all traffic to the FastAPI backend container on port 8000.

upstream api_backend {
    server api:8000;
}

# ── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.halicexamgenius.app;

    # Let Certbot prove domain ownership via HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.halicexamgenius.app;

    # ── SSL certificates (managed by Certbot on the host) ────────────────
    ssl_certificate     /etc/letsencrypt/live/api.halicexamgenius.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.halicexamgenius.app/privkey.pem;

    # ── Modern TLS settings ──────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Frame-Options        "DENY"           always;
    add_header X-Content-Type-Options "nosniff"        always;
    add_header X-XSS-Protection       "1; mode=block"  always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Prevent leaking Nginx version ────────────────────────────────────
    server_tokens off;

    # ── Client body limits (schedule requests are small JSON) ────────────
    client_max_body_size 2m;

    # ── Health check (fast, no proxy overhead) ───────────────────────────
    location = /health {
        proxy_pass http://api_backend/health;
    }

    # ── API routes ───────────────────────────────────────────────────────
    location / {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;

        # Forward real client IP to Uvicorn
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for slower Excel-fetch requests
        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;
    }

    # ── Block common exploit paths ───────────────────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 444;
    }
}
